spring.application.name=backend
server.port=8081

# H2
spring.datasource.url=jdbc:h2:mem:randallbarber
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=123

# JPA
# En pruebas uso create para que Hibernate cree la tabla desde cero al arrancar.
# Si uso update, intenta conservar lo anterior y a veces me enredo más depurando.
# Cuando el proyecto ya esté más estable, normalmente conviene usar update.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.format_sql=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console